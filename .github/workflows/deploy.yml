name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # 30分ごとにデータを最新化して再デプロイ
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Chatwork & Google Sheets からデータを取得 ────────────────────
      # data/ ディレクトリに JSON を生成するが、リポジトリにはコミットしない。
      # ビルド時のみ使用し、そのまま破棄される。
      - name: Fetch data from APIs
        run: node scripts/fetch-data.js
        env:
          CHATWORK_API_TOKEN:         ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_OPERATIONS:   ${{ secrets.CHATWORK_ROOM_OPERATIONS }}
          CHATWORK_ROOM_HP_LINE:      ${{ secrets.CHATWORK_ROOM_HP_LINE }}
          CHATWORK_ROOM_RECRUITMENT:  ${{ secrets.CHATWORK_ROOM_RECRUITMENT }}
          CHATWORK_ROOM_NOTIFICATION: ${{ secrets.CHATWORK_ROOM_NOTIFICATION }}
          CHATWORK_ROOM_CUSTOMER:     ${{ secrets.CHATWORK_ROOM_CUSTOMER }}
          GOOGLE_SHEETS_API_KEY:      ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_SHEETS_ID:           ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_CASES_RANGE:  ${{ secrets.GOOGLE_SHEETS_CASES_RANGE }}
          GOOGLE_SHEETS_LINE_RANGE:   ${{ secrets.GOOGLE_SHEETS_LINE_RANGE }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
