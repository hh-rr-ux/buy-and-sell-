name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  # 12時間ごとにデータを最新化して再デプロイ
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Chatwork & Google Sheets からデータを取得 ────────────────────
      # data/ ディレクトリに JSON を生成するが、リポジトリにはコミットしない。
      # ビルド時のみ使用し、そのまま破棄される。
      # continue-on-error: true → データ取得失敗でもビルド・デプロイを継続
      - name: Fetch data from APIs
        run: node scripts/fetch-data.js
        continue-on-error: true
        env:
          CHATWORK_API_TOKEN:         ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_OPERATIONS:   ${{ secrets.CHATWORK_ROOM_OPERATIONS }}
          CHATWORK_ROOM_HP_LINE:      ${{ secrets.CHATWORK_ROOM_HP_LINE }}
          CHATWORK_ROOM_RECRUITMENT:  ${{ secrets.CHATWORK_ROOM_RECRUITMENT }}
          CHATWORK_ROOM_NOTIFICATION: ${{ secrets.CHATWORK_ROOM_NOTIFICATION }}
          CHATWORK_ROOM_CUSTOMER:     ${{ secrets.CHATWORK_ROOM_CUSTOMER }}
          GOOGLE_SHEETS_API_KEY:      ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_SHEETS_ID:           ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_CASES_RANGE:  ${{ secrets.GOOGLE_SHEETS_CASES_RANGE }}
          GOOGLE_SHEETS_LINE_RANGE:   ${{ secrets.GOOGLE_SHEETS_LINE_RANGE }}

      - name: Build
        run: npx next build

      - name: Inject _worker.js into out/
        run: cp _worker.js out/_worker.js

      # ── Cloudflare Pages にデプロイ ──────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=buy-and-sell

      # ── デプロイ後に Chatwork メッセージを KV に蓄積 ──────────────────
      # 認証不要のエンドポイント。KV に保存した Chatwork 設定を使って
      # 各ルームの最新メッセージを取得・蓄積する。
      - name: Sync Chatwork messages to KV
        run: |
          sleep 10
          curl -s -X POST "https://buy-and-sell.pages.dev/api/sync-chatwork" \
            -H "Content-Type: application/json" \
            --max-time 30 || true
