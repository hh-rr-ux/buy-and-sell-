name: Fetch Data from Chatwork & Google Sheets

# このワークフローは Chatwork と Google Sheets からデータを取得し、
# data/ ディレクトリに JSON ファイルとして保存します。
# データ更新後に自動的に deploy.yml をトリガーしてサイトを再ビルドします。

on:
  # 30分ごとに自動実行
  schedule:
    - cron: '*/30 * * * *'
  # deploy.yml 完了後にも実行（初回デプロイ後にデータを取得）
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]
  # 手動実行も可能
  workflow_dispatch:

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── データ取得スクリプトを実行 ───────────────────────────────────
      # scripts/fetch-data.js が Chatwork と Google Sheets からデータを取得し
      # data/cases.json, data/line-inquiries.json, data/chatwork.json に書き込む
      - name: Fetch from Chatwork & Google Sheets
        run: node scripts/fetch-data.js
        env:
          CHATWORK_API_TOKEN:         ${{ secrets.CHATWORK_API_TOKEN }}
          CHATWORK_ROOM_OPERATIONS:   ${{ secrets.CHATWORK_ROOM_OPERATIONS }}
          CHATWORK_ROOM_HP_LINE:      ${{ secrets.CHATWORK_ROOM_HP_LINE }}
          CHATWORK_ROOM_RECRUITMENT:  ${{ secrets.CHATWORK_ROOM_RECRUITMENT }}
          CHATWORK_ROOM_NOTIFICATION: ${{ secrets.CHATWORK_ROOM_NOTIFICATION }}
          CHATWORK_ROOM_CUSTOMER:     ${{ secrets.CHATWORK_ROOM_CUSTOMER }}
          GOOGLE_SHEETS_API_KEY:      ${{ secrets.GOOGLE_SHEETS_API_KEY }}
          GOOGLE_SHEETS_ID:           ${{ secrets.GOOGLE_SHEETS_ID }}
          GOOGLE_SHEETS_CASES_RANGE:  ${{ secrets.GOOGLE_SHEETS_CASES_RANGE }}
          GOOGLE_SHEETS_LINE_RANGE:   ${{ secrets.GOOGLE_SHEETS_LINE_RANGE }}

      # ── データが変更された場合のみコミット・プッシュ ─────────────────
      - name: Commit and push if data changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ || true
          git diff --staged --quiet || git commit -m "chore: update data from API [$(date '+%Y-%m-%d %H:%M UTC')]"
          git push || true

      # ── データ更新後に再デプロイをトリガー ──────────────────────────
      - name: Trigger deploy
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            })
